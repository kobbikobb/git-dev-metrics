<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Velocity</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --muted: #8b8fa3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
  }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 1.5rem; letter-spacing: -0.02em; }
  .header p { color: var(--muted); font-size: 0.875rem; margin-top: 0.25rem; }
  .grid {
    display: grid;
    gap: 1.5rem;
    max-width: 1000px;
    margin: 0 auto;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
  }
  .card h2 { font-size: 1rem; margin-bottom: 0.75rem; }
  .chart-wrap { position: relative; height: 400px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<div class="header">
  <h1>Team Velocity</h1>
  <p>{{ period_range }}</p>
</div>
<div class="grid">
  <div class="card"><h2>PR throughput by repo, active devs, and PRs per developer</h2><div class="chart-wrap"><canvas id="velocity"></canvas></div></div>
</div>
<script>
const MONTHS = {{ months | tojson }};
const REPOS = {{ repos | tojson }};
const REPO_PR_COUNTS = {{ repo_pr_counts | tojson }};
const ACTIVE_DEVS = {{ active_devs | tojson }};
const PRS_PER_DEV = {{ prs_per_dev | tojson }};

const palette = ['#6366f1', '#22c55e', '#eab308', '#ef4444', '#06b6d4', '#f97316', '#3b82f6', '#a855f7', '#ec4899', '#14b8a6'];

const datasets = [];

REPOS.forEach(function(repo, i) {
  const c = palette[i % palette.length];
  datasets.push({
    label: repo,
    data: REPO_PR_COUNTS[repo],
    borderColor: c,
    backgroundColor: c + '22',
    fill: false,
    tension: 0.2,
    pointRadius: 3,
    pointHoverRadius: 5,
    yAxisID: 'y',
  });
});

datasets.push({
  label: 'Active developers',
  data: ACTIVE_DEVS,
  borderColor: '#fefefe',
  backgroundColor: 'rgba(254, 254, 254, 0.1)',
  fill: true,
  tension: 0.2,
  pointRadius: 4,
  pointHoverRadius: 6,
  yAxisID: 'y1',
});

datasets.push({
  label: 'PRs per developer',
  data: PRS_PER_DEV,
  borderColor: '#f97316',
  backgroundColor: 'rgba(249, 115, 22, 0.1)',
  borderDash: [5, 3],
  fill: false,
  tension: 0.2,
  pointRadius: 3,
  pointHoverRadius: 5,
  yAxisID: 'y1',
});

new Chart(document.getElementById('velocity'), {
  type: 'line',
  data: { labels: MONTHS, datasets: datasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    scales: {
      x: {
        ticks: { color: '#8b8fa3' },
        grid: { color: '#2a2d3a' },
      },
      y: {
        type: 'linear',
        display: true,
        position: 'left',
        title: { display: true, text: 'Merged PRs', color: '#8b8fa3' },
        ticks: { color: '#8b8fa3' },
        grid: { color: '#2a2d3a' },
        beginAtZero: true,
      },
      y1: {
        type: 'linear',
        display: true,
        position: 'right',
        title: { display: true, text: 'Developers / PRs per dev', color: '#8b8fa3' },
        ticks: { color: '#8b8fa3' },
        grid: { drawOnChartArea: false },
        beginAtZero: true,
      },
    },
    plugins: {
      legend: {
        labels: { color: '#e1e4ed', usePointStyle: true, padding: 20 },
      },
      tooltip: {
        callbacks: {
          label: function(ctx) {
            return ctx.dataset.label + ': ' + ctx.parsed.y;
          },
        },
      },
    },
  },
});
</script>
</body>
</html>
