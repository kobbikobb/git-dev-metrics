<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend — {{ org }}/{{ repo }}</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --muted: #8b8fa3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
  }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 1.5rem; letter-spacing: -0.02em; }
  .header p { color: var(--muted); font-size: 0.875rem; margin-top: 0.25rem; }
  .grid {
    display: grid;
    gap: 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
  }
  .card h2 { font-size: 1rem; margin-bottom: 0.75rem; }
  .chart-wrap { position: relative; height: 360px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<div class="header">
  <h1>Trend — {{ org }}/{{ repo }}</h1>
  <p>{{ period_range }}</p>
</div>
<div class="grid">
  <div class="card"><h2>PRs per developer</h2><div class="chart-wrap"><canvas id="prs"></canvas></div></div>
  <div class="card"><h2>Median cycle time (h)</h2><div class="chart-wrap"><canvas id="cycle"></canvas></div></div>
  <div class="card"><h2>AI-assisted PR %</h2><div class="chart-wrap"><canvas id="ai"></canvas></div></div>
</div>
<script>
const DATA = {{ dataset | tojson }};

const palette = ['#6366f1', '#22c55e', '#eab308', '#ef4444', '#06b6d4', '#f97316', '#3b82f6', '#a855f7'];

function datasetsFor(field) {
  return DATA.months.map((monthKey, i) => ({
    label: monthKey,
    backgroundColor: palette[i % palette.length],
    data: DATA.devs.map(dev => DATA.rows[dev][i][field]),
  }));
}

function render(canvasId, field, axisLabel) {
  new Chart(document.getElementById(canvasId), {
    type: 'bar',
    data: { labels: DATA.devs, datasets: datasetsFor(field) },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { title: { display: true, text: axisLabel, color: '#8b8fa3' }, ticks: { color: '#8b8fa3' }, grid: { color: '#2a2d3a' } },
        y: { ticks: { color: '#e1e4ed' }, grid: { color: '#2a2d3a' } },
      },
      plugins: { legend: { labels: { color: '#e1e4ed' } } },
    },
  });
}

render('prs', 'pr_count', 'PRs');
render('cycle', 'cycle_hours', 'Hours');
render('ai', 'ai_pct', 'Percent');
</script>
</body>
</html>
