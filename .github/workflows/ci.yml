name: Build and Test
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/adr/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest --cov=git_dev_metrics --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint and format check
        run: |
          uv run ruff check git_dev_metrics tests/
          uv run ruff format --check git_dev_metrics tests/

      - name: Dead code check
        run: uv run vulture

      - name: Security scan
        run: uv run bandit -s B105 -r git_dev_metrics

      - name: Type check
        run: uv run pyright

      - name: Check workflow files
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

      - name: Audit dependencies
        run: uv run pip-audit
